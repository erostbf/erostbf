<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EROSTBF</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:wght@400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #fff;
  color: #111;
  overflow-x: hidden;
}

/* CURSOR */
.cursor {
  width: 12px;
  height: 12px;
  border: 1px solid #111;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: transform 0.08s ease;
  z-index: 999;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  padding: 0 12%;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  font-weight: 400;
  letter-spacing: 6px;
}

.hero p {
  margin-top: 12px;
  font-size: 13px;
  color: #777;
}

.btn {
  margin-top: 35px;
  display: inline-block;
  font-size: 12px;
  letter-spacing: 1px;
  border-bottom: 1px solid #111;
  text-decoration: none;
  color: #111;
  padding-bottom: 3px;
  transition: opacity .3s ease;
}

.btn:hover { opacity: 0.5; }

/* PORTFOLIO */
.portfolio {
  padding: 120px 12%;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.grid img {
  width: 100%;
  transition: transform .6s ease, opacity .6s ease;
}

.grid img:hover {
  transform: scale(1.02);
  opacity: 0.85;
}

/* FADE IN */
.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: all 1s ease;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ABOUT */
.about {
  padding: 120px 12%;
  max-width: 500px;
}

.about p {
  font-size: 14px;
  color: #444;
}

/* CONTACT */
.contact {
  padding: 120px 12%;
}

.contact a {
  display: block;
  font-size: 13px;
  margin-top: 10px;
  text-decoration: none;
  color: #111;
  transition: opacity .3s;
}

.contact a:hover { opacity: 0.5; }

/* MOBILE */
@media (min-width: 768px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .hero h1 {
    font-size: 90px;
  }
}
</style>
</head>

<body>

<div class="cursor"></div>

<section class="hero fade">
  <div>
    <h1>EROSTBF</h1>
    <p>Fine Line Tattoo · Buenos Aires</p>
    <a class="btn" href="https://wa.me/5491132420984">Reservar turno</a>
  </div>
</section>

<section class="portfolio fade">
  <div class="grid">
    <img src="img2.jpg">
    <img src="img3.jpg">
    <img src="img4.jpg">
    <img src="img5.jpg">
    <img src="img6.jpg">
  </div>
</section>

<section class="about fade">
  <p>
    Tatuador de fine line encado en el equilibrio y las composiciones atemporales.
    Cada pieza la diseñamos para que coexista naturalmente con el cuerpo, no siendo el tatuaje y el cuerpo partes separadas sino un todo.
  </p>
</section>

<section class="contact fade">
  <a href="https://wa.me/5491132420984">WhatsApp</a>
  <a href="https://instagram.com/erostbf.ttt">Instagram</a>
</section>

<script>
/* CURSOR */
const cursor = document.querySelector('.cursor');
document.addEventListener('mousemove', e => {
  cursor.style.top = e.clientY + 'px';
  cursor.style.left = e.clientX + 'px';
});

/* FADE IN ON SCROLL */
const faders = document.querySelectorAll('.fade');

const appearOptions = {
  threshold: 0.2
};

const appearOnScroll = new IntersectionObserver(function(entries, observer) {
  entries.forEach(entry => {
    if(!entry.isIntersecting) return;
    entry.target.classList.add('visible');
    observer.unobserve(entry.target);
  });
}, appearOptions);

faders.forEach(fader => {
  appearOnScroll.observe(fader);
});
</script>

</body>
</html>
